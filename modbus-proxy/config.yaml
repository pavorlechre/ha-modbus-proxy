name: Modbus Proxy
version: "1.0.0"
slug: modbus_proxy
description: Modbus TCP proxy - umožňuje více klientům přistupovat k jednomu Modbus zařízení
url: ""
arch:
  - aarch64
  - armv7
  - amd64
startup: services
init: false
build: .
ports:
  5020/tcp: 5020
ports_description:
  5020/tcp: Modbus proxy port (klienti se připojují sem)
options:
  target_host: "192.168.1.100"
  target_port: 502
  listen_port: 5020
  log_level: info
schema:
  target_host: str
  target_port: int
  listen_port: int
  log_level: list(debug|info|warning|error)
